---
layout: default
---

<nav class="navbar">
  <div class="navbar-brand">
    <h1 class="site-title">{{ site.title | escape }}</h1>
  </div>
  <ul class="navbar-nav" id="navBar">
    <li><a href="#home" class="nav-link active" data-section="home">Home</a></li>
    <li><a href="#about" class="nav-link" data-section="about">About</a></li>
    <li><a href="#research" class="nav-link" data-section="research">Research</a></li>
    <li><a href="#contact" class="nav-link" data-section="contact">Contact</a></li>
  </ul>
</nav>

<div class="site-container">
  <main class="main-content">
    <section class="page-section home-section" id="home">
      <div class="section-content">
        <div class="hero">
          <h1>Welcome</h1>
          <p>Your content goes here</p>
        </div>
      </div>
    </section>

    <section class="page-section about-section" id="about">
      <div class="section-content">
        <h1>About</h1>
        <p>Your about content goes here</p>
      </div>
    </section>

    <section class="page-section research-section" id="research">
      <div class="section-content">
        <h1>Research</h1>
        <p>Your research content goes here</p>
      </div>
    </section>

    <section class="page-section contact-section" id="contact">
      <div class="section-content">
        <h1>Contact</h1>
        <p>Your contact information goes here</p>
      </div>
    </section>
  </main>
</div>

<script>
  // Highlight active nav link on scroll
  const sections = document.querySelectorAll('.page-section');
  const navLinks = document.querySelectorAll('.nav-link');

  window.addEventListener('scroll', () => {
    let current = '';
    
    sections.forEach(section => {
      const sectionTop = section.offsetTop;
      
      if (window.scrollY >= sectionTop - 100) {
        current = section.getAttribute('id');
      }
    });

    navLinks.forEach(link => {
      link.classList.remove('active');
      if (link.getAttribute('data-section') === current) {
        link.classList.add('active');
      }
    });
  });

  // Smooth scroll on nav link click
  navLinks.forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const targetSection = link.getAttribute('data-section');
      const targetElement = document.getElementById(targetSection);
      if (targetElement) {
        targetElement.scrollIntoView({ behavior: 'smooth' });
      }
    });
  });
</script>
